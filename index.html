<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- bootstrap -->
    <!-- link dos CSS -->
    <link rel="stylesheet" href=".//styles/tela1.css">
    <!-- link dos CSS -->
    <!-- cdn fonts awesone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- cdn fonts awesone -->
    <title>Troca Fácil</title>
</head>
<body>
    <header>
        <nav>   
            <div class="align-logo">
                <img src=".//img/TrocaFácilLogo.png" alt="Logo da TrocaFácil" class="TF-logo">
            </div>
        </nav>
    </header>
    
    <main>
        <section class="section1">
            <h1 class="title-login">Login</h1>
            <div class="card">
                <div class="email-login">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Digite o seu e-mail" required>
                </div>
            </div>

            <div class="card">
                <div class="email-senha">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="Digite a sua senha" required>
                </div>
            </div>

            <div class="btn-align">
                 <a href="tela2.html" class="btn-login">
                    Login
                </a>
            </div>  
        </section>
        <hr>    
        <section class="section2">
            <h3 class="text-cadastro">Não tem login?<br><a href="cadastro.html">Cadastrar-se</a></h3>
        </section>
    </main>

</body>
</html>
