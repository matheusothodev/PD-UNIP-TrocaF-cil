<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- bootstrap -->
    <!-- link dos CSS -->
    <link rel="stylesheet" href=".//styles/tela3.css">
    <!-- link dos CSS -->
    <!-- cdn fonts awesone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- cdn fonts awesone -->
    <title>Troca Fácil</title>
</head>
<body>
    <header>
        <nav>
            <div class="align-logo">
                <img src=".//img/TrocaFácilLogo.png" alt="Logo da TrocaFácil" class="TF-logo">
            </div>
        </nav>
    </header>
    
    <main>
        <section class="section3">
            <h1 class="title-cadastro">Cadastrar Objeto</h1>

            <div class="info-cadastro_objeto">
                <div class="inputs">

                    <label>Nome do Objeto</label>
                    <input type="text" id="nome_Objeto" placeholder="Ex: Bicicleta">

                    <label>Descrição</label>
                    <input type="text" id="descricao_Objeto" placeholder="Ex: Está em ótimo estado">
                    
                    <div class="upload-imagem">
                        <img src="./img/iconeAdicionarImagem.png" alt="Adicionar Imagem">
                        <span>Adicionar Imagem</span>
                    </div>

                    <label class="info-imagem">*No mínimo 3 imagens</label>

                </div>
            </div>

            <!-- corrigido div -->
            <div class="btn-align-margins">
                <div class="btn-align2">
                    <a href="index.html" class="btn-cadastro">
                        Finalizar Cadastro
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
