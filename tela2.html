<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/tela2.css">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <title>Troca Fácil</title>
</head>
<body>

<header class="topo">
    <div class="container header-content">
        <img src="./img/TrocaFácilLogo.png" class="logo">
        <i class="fa-solid fa-user user-icon"></i>
    </div>
</header>

<main class="container tela">

    <!-- BUSCA -->
    <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar...">
    </div>

    <!-- TÍTULO -->
    <h3 class="titulo">Objetos Disponíveis</h3>

    <!-- LISTA -->
    <div class="lista">

        <div class="item">
            <img src="./img/livro.jpg">
            <div>
                <h5>Livros de Romance</h5>
                <span class="status">Disponível</span>
            </div>
        </div>

        <div class="item">
            <img src="./img/fone.jpg">
            <div>
                <h5>Fone de Ouvido</h5>
                <span class="status">Disponível</span>
            </div>
        </div>

        <div class="item">
            <img src="./img/oculos.jpg">
            <div>
                <h5>Óculos Escuros</h5>
                <span class="status">Disponível</span>
            </div>
        </div>

    </div>

    <!-- BOTÃO -->
    <div class="btn-area">
        <a href="cadastroObjeto.html" class="btn-cadastrar">
            Cadastrar Objeto
        </a>
    </div>

</main>

</body>
</html>
